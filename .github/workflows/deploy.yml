name: Deploy tutorial to Pages

on:
  workflow_dispatch:
    inputs:
      version:
        required: false

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docc:
    if: ${{ github.event.inputs.version != '' }}
    runs-on: macos-15
    env:
      VERSION: ${{ github.event.inputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          repository: shipgodot/docs
          lfs: true
          ref: ${{ github.event.inputs.version }}
      - name: Build versioned DocC
        run: |
          mkdir -p ./docc-output
          xcrun docc convert ShipGodotIOS.docc/ \
            --output-path "./docc-output/${VERSION}" \
            --transform-for-static-hosting \
            --hosting-base-path "${VERSION}"
      - name: Build latest DocC
        run: |
          xcrun docc convert ShipGodotIOS.docc/ \
            --output-path "./docc-output/latest" \
            --transform-for-static-hosting \
            --hosting-base-path "latest"
      - name: Upload Exported Tutorial
        uses: actions/upload-artifact@v6
        with:
          name: docc-build
          path: ./docc-output
          retention-days: 1

  build-and-deploy:
    needs: build-docc
    if: ${{ always() && needs.build-docc.result != 'failure' && needs.build-docc.result != 'cancelled' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - name: Download DocC build
        if: ${{ github.event.inputs.version != '' }}
        uses: actions/download-artifact@v8
        with:
          name: docc-build
          path: ./docc-build
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build Tailwind CSS
        run: npm run build
      - name: Merge with docc output
        run: |
          mkdir -p public/css
          if [ -d docc-build ]; then
            cp -R docc-build/. public/
          fi
          cp ./static/*.html public/
          cp ./static/favicon.ico public/
          cp ./static/css/styles.css public/css/styles.css
      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true
